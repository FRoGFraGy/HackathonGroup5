<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE SILENT THREAT | IP FREQUENCY ANALYTICS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05080a;
            --accent-red: #ff3e3e;
            --accent-blue: #00d4ff;
            --panel-bg: #0d1117;
            --text: #c9d1d9;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            margin: 0; padding: 20px;
        }
        .dashboard {
            max-width: 1200px;
            margin: auto;
            border: 1px solid #30363d;
            background: var(--panel-bg);
            padding: 30px;
            box-shadow: 0 0 40px rgba(255, 62, 62, 0.15);
        }
        header { border-left: 5px solid var(--accent-red); padding-left: 20px; margin-bottom: 40px; }
        h1 { color: var(--accent-red); margin: 0; font-size: 1.8rem; letter-spacing: 2px; }
        .meta { color: var(--accent-blue); font-size: 0.8rem; margin-top: 5px; }

        .chart-box { background: #161b22; padding: 20px; border: 1px solid #30363d; margin-bottom: 30px; }
        h2 { font-size: 1rem; color: #8b949e; margin-top: 0; border-bottom: 1px solid #30363d; padding-bottom: 10px; }

        .hacker-signature {
            background: #000;
            border: 2px solid var(--accent-red);
            padding: 50px 20px;
            text-align: center;
            margin-top: 60px;
            position: relative;
        }
        .taunt-msg {
            font-size: 1.3rem;
            color: #fff;
            font-style: italic;
            line-height: 1.6;
            text-shadow: 0 0 10px var(--accent-red);
        }
        .goemon-name {
            display: block;
            font-size: 4rem;
            font-weight: 900;
            color: var(--accent-red);
            margin-top: 20px;
            letter-spacing: 20px;
            text-transform: uppercase;
            animation: glitch 1s infinite;
        }
        @keyframes glitch {
            0% { transform: translate(0); text-shadow: 2px 2px var(--accent-blue); }
            25% { transform: translate(-2px, 2px); }
            50% { transform: translate(2px, -2px); text-shadow: -2px -2px var(--accent-red); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <h1>INCIDENT RESPONSE: IP THREAT INTELLIGENCE</h1>
        <div class="meta">TOTAL ATTACK LOGS ANALYZED: 5,372,902 INCIDENTS</div>
    </header>

    <div class="chart-box">
        <h2>Frequency of Attacks by Attacker IP & Hour (Top Samples)</h2>
        <canvas id="ipFreqChart" height="120"></canvas>
    </div>

    <div class="hacker-signature">
        <div class="taunt-msg">
            "NEXUS CART WAS TO EASY YOUR SYSTEM WAS ALREADY FALLING APART BEFORE YOU EVEN REALIZED IT WAS ME"
        </div>
        <div class="goemon-name">GOEMON</div>
    </div>
</div>

<script>
    const ctx = document.getElementById('ipFreqChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['15:00', '17:00', '18:00', '19:00', '20:00', '21:00', '23:00'],
            datasets: [
                {
                    label: 'IP: 209.103.8.44',
                    data: ,
                    backgroundColor: 'rgba(255, 62, 62, 0.7)'
                },
                {
                    label: 'IP: 197.82.237.190',
                    data: ,
                    backgroundColor: 'rgba(0, 212, 255, 0.7)'
                },
                {
                    label: 'IP: 119.123.55.141',
                    data: ,
                    backgroundColor: 'rgba(255, 204, 0, 0.7)'
                },
                {
                    label: 'IP: 211.92.75.1',
                    data: ,
                    backgroundColor: 'rgba(40, 167, 69, 0.7)'
                }
            ]
        },
        options: {
            responsive: true,
            scales: {
                y: { 
                    beginAtZero: false, 
                    min: 11000, 
                    grid: { color: '#21262d' },
                    ticks: { color: '#8b949e' }
                },
                x: { 
                    grid: { display: false },
                    ticks: { color: '#8b949e' }
                }
            },
            plugins: {
                legend: { labels: { color: '#c9d1d9', font: { size: 10 } } }
            }
        }
    });
</script>

</body>
</html>
